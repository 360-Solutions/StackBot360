<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>StackBot360 by 360 Solutions</title>
    <style>
        /* CSS VARIABLES & THEMES */
        :root {
            --bg-color: #f4f6f8;
            --panel-bg: #ffffff;
            --text-dark: #1f2328;
            --text-dim: #656d76;
            --brand-color: #0969da;
            --border-color: #d0d7de;
            --success-color: #2da44e;
        }

        /* DARK MODE OVERRIDES */
        body.dark-mode {
            --bg-color: #0d1117;
            --panel-bg: #161b22;
            --text-dark: #c9d1d9;
            --text-dim: #8b949e;
            --brand-color: #58a6ff;
            --border-color: #30363d;
            --success-color: #238636;
        }

        /* BASE STYLES */
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-dark);
            margin: 0; 
            padding: 15px;
            padding-top: max(15px, env(safe-area-inset-top)); 
            padding-bottom: max(15px, env(safe-area-inset-bottom));
            min-height: 100vh; 
            width: 100vw; 
            box-sizing: border-box;
            overflow-x: hidden;
            transition: background-color 0.3s, color 0.3s;
        }

        .view-container {
            width: 100%; 
            max-width: 400px; 
            margin: 0 auto; 
            display: none; 
            flex-direction: column; 
            gap: 15px;
        }
        
        #capture-view { display: flex; }

        /* HEADER */
        .header { text-align: center; margin-bottom: 5px; position: relative;}
        .header h1 { margin: 0; font-size: 28px; color: var(--brand-color); font-weight: 900; letter-spacing: -0.5px;}
        .brand-tag { font-size: 10px; color: var(--text-dim); text-transform: uppercase; font-weight: bold; letter-spacing: 1px;}
        
        .theme-toggle { position: absolute; top: 0; right: 0; background: none; border: none; font-size: 20px; cursor: pointer; padding: 5px;}

        .active-list-bar { background: var(--panel-bg); border: 2px solid var(--brand-color); border-radius: 8px; padding: 12px; text-align: center; cursor: pointer; }
        .active-list-label { font-size: 10px; color: var(--brand-color); text-transform: uppercase; font-weight: 900;}
        .active-list-name { font-size: 18px; font-weight: bold; margin-top: 4px;}

        /* INPUTS & BUTTONS */
        textarea, input[type="text"] {
            width: 100%; padding: 15px; box-sizing: border-box;
            background: var(--panel-bg); color: var(--text-dark);
            border: 2px solid var(--border-color); border-radius: 8px; font-size: 16px;
            font-family: inherit;
        }
        
        #single-input { height: 100px; text-align: center; font-weight: bold;}
        #batch-input { font-size: 14px; white-space: pre-wrap; height: 250px; resize: none;}
        
        .meta-input-group { display: flex; gap: 10px; }
        .meta-input-group input { padding: 10px; font-size: 14px; }
        #batch-title { flex: 2; font-weight: bold;}
        #batch-date { flex: 1; text-align: center; color: var(--text-dim);}

        button {
            border: none; border-radius: 8px; font-weight: bold; font-size: 14px;
            padding: 15px; cursor: pointer; text-transform: uppercase;
        }

        .btn-primary { background: var(--brand-color); color: white; width: 100%; }
        .btn-secondary { background: var(--panel-bg); color: var(--text-dark); border: 1px solid var(--border-color); width: 100%; }
        .btn-play { background: var(--success-color); color: white; width: 100%; padding: 18px; font-size: 18px; margin-top: 10px;}
        .btn-danger { background: transparent; color: #cf222e; border: 1px solid #cf222e; width: 100%; }

        .row-btns { display: flex; gap: 10px; flex-wrap: wrap;}
        .row-btns button { flex: 1; padding: 10px; font-size: 12px;}

        /* LIBRARY & CARDS */
        .lib-section-title { font-size: 11px; font-weight: 900; color: var(--text-dim); text-transform: uppercase; margin-bottom: 5px; margin-top: 15px; border-bottom: 1px solid var(--border-color); padding-bottom: 5px;}
        .library-list { display: flex; flex-direction: column; gap: 8px; }
        .lib-item { background: var(--panel-bg); border: 1px solid var(--border-color); padding: 12px; border-radius: 8px; text-align: left; display: flex; justify-content: space-between; align-items: center; color: var(--text-dark);}
        .lib-title { font-size: 15px; font-weight: bold;}
        .lib-desc { font-size: 11px; color: var(--text-dim); margin-top: 3px;}

        .card {
            background: var(--panel-bg); border: 2px solid var(--border-color); border-radius: 12px;
            min-height: 220px; display: flex; justify-content: center; align-items: center;
            padding: 20px; text-align: center; margin: 15px 0;
        }
        .card-term { font-size: 34px; font-weight: 900; line-height: 1.2; word-wrap: break-word; }

        .settings-panel { background: var(--panel-bg); border: 2px solid var(--border-color); border-radius: 12px; padding: 15px; font-size: 12px; font-weight: bold; color: var(--text-dim);}
        input[type=range] { width: 100%; accent-color: var(--brand-color); margin-top: 5px; margin-bottom: 15px;}
    </style>
</head>
<body>

    <div id="capture-view" class="view-container">
        <div class="header">
            <h1>StackBot360</h1>
            <div class="brand-tag">By 360 Solutions</div>
            <button class="theme-toggle" onclick="toggleDarkMode()">🌓</button>
        </div>

        <div class="active-list-bar" onclick="showView('library-view')">
            <div class="active-list-label">Currently Active Stack:</div>
            <div id="active-list-title-display" class="active-list-name">Loading...</div>
        </div>

        <textarea id="single-input" placeholder="Type or paste a phrase here..."></textarea>
        <button class="btn-primary" onclick="saveSingleMemo()">➕ Add to Current Stack</button>
        
        <div style="text-align:center; color:var(--text-dim); font-weight:900; margin:5px 0; font-size: 12px;">OR</div>
        
        <button class="btn-secondary" onclick="openBatchEditor()">📝 View/Edit Full Stack</button>
        <button class="btn-play" id="start-btn" onclick="startReviewMode()">▶ START BOT (0)</button>
    </div>

    <div id="library-view" class="view-container">
        <div class="header"><h1>Stack Library</h1></div>
        
        <div class="lib-section-title">Your Custom Stacks</div>
        <div id="user-lists-container" class="library-list"></div>
        
        <div class="lib-section-title">360 Templates (Tap to Clone)</div>
        <div class="library-list">
            <button class="lib-item" onclick="loadTemplate('states')">
                <div><div class="lib-title">50 States & Capitals</div><div class="lib-desc">US Geography Default</div></div>
            </button>
            <button class="lib-item" onclick="loadTemplate('presidents')">
                <div><div class="lib-title">US Presidents</div><div class="lib-desc">1 to 47 Chronological</div></div>
            </button>
        </div>

        <button class="btn-secondary" onclick="createNewList()" style="margin-top:20px;">＋ CREATE NEW STACK</button>
        <button class="btn-secondary" onclick="showView('capture-view')">← BACK TO HUB</button>
    </div>

    <div id="batch-view" class="view-container">
        <div class="header"><h1>Stack Editor</h1></div>
        
        <div class="meta-input-group">
            <input type="text" id="batch-title" placeholder="Stack Title">
            <input type="text" id="batch-date" placeholder="Date">
        </div>
        
        <textarea id="batch-input" placeholder="Paste your list here, one item per line."></textarea>
        
        <div class="row-btns">
            <button class="btn-secondary" onclick="sortBatch('az')">A - Z</button>
            <button class="btn-secondary" onclick="sortBatch('za')">Z - A</button>
            <button class="btn-secondary" onclick="sortBatch('reverse')">Reverse Order</button>
        </div>
        
        <button class="btn-primary" onclick="saveBatch()">💾 SAVE CHANGES</button>
        <button class="btn-secondary" onclick="saveAsNew()" style="border-color: var(--brand-color); color: var(--brand-color);">📄 SAVE AS NEW (COPY)</button>
        
        <div class="row-btns" style="margin-top: 10px;">
            <button class="btn-secondary" onclick="copyBatchToClipboard()">📋 Copy List</button>
            <button class="btn-danger" onclick="deleteCurrentList()">Delete Stack</button>
        </div>
        
        <button class="btn-secondary" onclick="showView('capture-view')">← CANCEL</button>
    </div>

    <div id="playback-view" class="view-container">
        <div style="display:flex; justify-content: space-between; align-items: center;">
            <button class="btn-secondary" onclick="exitReviewMode()" style="width:auto; padding: 10px 20px;">STOP BOT</button>
            <div id="timer-text" style="font-weight:900; color:var(--brand-color); font-size:24px;">3s</div>
        </div>
        
        <div class="card"><div id="card-term-text" class="card-term">...</div></div>
        
        <div style="display:flex; gap:10px;">
            <button class="btn-secondary" style="flex:1; font-size: 20px;" onclick="rewindCard()">⏮</button>
            <button id="play-pause-btn" class="btn-primary" style="flex:2" onclick="togglePlayPause()">⏸ PAUSE</button>
            <button class="btn-secondary" style="flex:1; font-size: 20px;" onclick="skipCard()">⏭</button>
        </div>
        
        <div class="settings-panel">
            <button id="voice-btn" class="btn-secondary" onclick="toggleVoice()" style="margin-bottom:15px; width: 100%;">🔊 VOICE: ON</button>
            <div style="display: flex; justify-content: space-between;"><span>Voice Speed</span><span id="speed-val">1x</span></div>
            <input type="range" id="speed-slider" min="0.5" max="2.0" step="0.1" value="1.0" oninput="updateSpeed(this.value)">
            <div style="display: flex; justify-content: space-between;"><span>Bot Tempo (Wait Time)</span><span id="tempo-val">3s</span></div>
            <input type="range" id="tempo-slider" min="1" max="15" value="3" oninput="updateTempo(this.value)">
        </div>
    </div>

<script>
    /* 1. FACTORY TEMPLATES */
    const templates = {
        states: { 
            name: "50 States & Capitals", 
            data: "Montgomery: Alabama\nJuneau: Alaska\nPhoenix: Arizona\nLittle Rock: Arkansas\nSacramento: California\nDenver: Colorado\nHartford: Connecticut\nDover: Delaware\nTallahassee: Florida\nAtlanta: Georgia\nHonolulu: Hawaii\nBoise: Idaho\nSpringfield: Illinois\nIndianapolis: Indiana\nDes Moines: Iowa\nTopeka: Kansas\nFrankfort: Kentucky\nBaton Rouge: Louisiana\nAugusta: Maine\nAnnapolis: Maryland\nBoston: Massachusetts\nLansing: Michigan\nSt. Paul: Minnesota\nJackson: Mississippi\nJefferson City: Missouri\nHelena: Montana\nLincoln: Nebraska\nCarson City: Nevada\nConcord: New Hampshire\nTrenton: New Jersey\nSanta Fe: New Mexico\nAlbany: New York\nRaleigh: North Carolina\nBismarck: North Dakota\nColumbus: Ohio\nOklahoma City: Oklahoma\nSalem: Oregon\nHarrisburg: Pennsylvania\nProvidence: Rhode Island\nColumbia: South Carolina\nPierre: South Dakota\nNashville: Tennessee\nAustin: Texas\nSalt Lake City: Utah\nMontpelier: Vermont\nRichmond: Virginia\nOlympia: Washington\nCharleston: West Virginia\nMadison: Wisconsin\nCheyenne: Wyoming" 
        },
        presidents: { 
            name: "US Presidents", 
            data: "1. George Washington 1789 to 1797\n2. John Adams 1797 to 1801\n3. Thomas Jefferson 1801 to 1809\n4. James Madison 1809 to 1817\n5. James Monroe 1817 to 1825\n6. John Quincy Adams 1825 to 1829\n7. Andrew Jackson 1829 to 1837\n8. Martin Van Buren 1837 to 1841\n9. William Henry Harrison 1841\n10. John Tyler 1841 to 1845\n11. James K. Polk 1845 to 1849\n12. Zachary Taylor 1849 to 1850\n13. Millard Fillmore 1850 to 1853\n14. Franklin Pierce 1853 to 1857\n15. James Buchanan 1857 to 1861\n16. Abraham Lincoln 1861 to 1865\n17. Andrew Johnson 1865 to 1869\n18. Ulysses S. Grant 1869 to 1877\n19. Rutherford B. Hayes 1877 to 1881\n20. James A. Garfield 1881\n21. Chester A. Arthur 1881 to 1885\n22. Grover Cleveland 1885 to 1889\n23. Benjamin Harrison 1889 to 1893\n24. Grover Cleveland 1893 to 1897\n25. William McKinley 1897 to 1901\n26. Theodore Roosevelt 1901 to 1909\n27. William Howard Taft 1909 to 1913\n28. Woodrow Wilson 1913 to 1921\n29. Warren G. Harding 1921 to 1923\n30. Calvin Coolidge 1923 to 1929\n31. Herbert Hoover 1929 to 1933\n32. Franklin D. Roosevelt 1933 to 1945\n33. Harry S. Truman 1945 to 1953\n34. Dwight D. Eisenhower 1953 to 1961\n35. John F. Kennedy 1961 to 1963\n36. Lyndon B. Johnson 1963 to 1969\n37. Richard Nixon 1969 to 1974\n38. Gerald Ford 1974 to 1977\n39. Jimmy Carter 1977 to 1981\n40. Ronald Reagan 1981 to 1989\n41. George H.W. Bush 1989 to 1993\n42. Bill Clinton 1993 to 2001\n43. George W. Bush 2001 to 2009\n44. Barack Obama 2009 to 2017\n45. Donald Trump 2017 to 2021\n46. Joe Biden 2021 to 2025\n47. Donald Trump 2025 to Present" 
        }
    };

    /* 2. LOCAL STORAGE & APP STATE */
    let app = JSON.parse(localStorage.getItem('stackBotV7')) || {
        activeId: 'default',
        lists: { 'default': { name: "My First Stack", items: [], date: new Date().toLocaleDateString() } },
        voice: true, speed: 1.0, tempo: 3, darkMode: false
    };

    let deck = [], history = [], hIndex = -1, timer = null, isPaused = false, countdown = app.tempo;

    window.onload = () => {
        if(app.darkMode) document.body.classList.add('dark-mode');
        updateUI();
        document.getElementById('speed-slider').value = app.speed;
        document.getElementById('tempo-slider').value = app.tempo;
        document.getElementById('speed-val').innerText = app.speed + 'x';
        document.getElementById('tempo-val').innerText = app.tempo + 's';
        updateVoiceBtn();
    };

    function save() {
        localStorage.setItem('stackBotV7', JSON.stringify(app));
        updateUI();
    }

    function toggleDarkMode() {
        document.body.classList.toggle('dark-mode');
        app.darkMode = document.body.classList.contains('dark-mode');
        save();
    }

    function updateUI() {
        if (!app.lists[app.activeId]) { app.activeId = Object.keys(app.lists)[0]; }
        const active = app.lists[app.activeId];
        document.getElementById('active-list-title-display').innerText = active.name;
        document.getElementById('start-btn').innerText = `▶ START BOT (${active.items.length})`;
    }

    function showView(id) {
        document.querySelectorAll('.view-container').forEach(v => v.style.display = 'none');
        document.getElementById(id).style.display = 'flex';
        if (id === 'library-view') renderLib();
    }

    /* 3. BATCH EDITOR & DATA LOGIC */
    function saveSingleMemo() {
        const val = document.getElementById('single-input').value.trim();
        if (val) {
            app.lists[app.activeId].items.push(val);
            save();
            document.getElementById('single-input').value = '';
        }
    }

    function openBatchEditor() {
        const active = app.lists[app.activeId];
        document.getElementById('batch-title').value = active.name;
        document.getElementById('batch-date').value = active.date;
        document.getElementById('batch-input').value = active.items.join('\n');
        showView('batch-view');
    }

    function saveBatch() {
        let lines = document.getElementById('batch-input').value.split('\n').map(l => l.trim()).filter(l => l);
        app.lists[app.activeId].name = document.getElementById('batch-title').value || "Untitled Stack";
        app.lists[app.activeId].date = document.getElementById('batch-date').value || new Date().toLocaleDateString();
        app.lists[app.activeId].items = lines;
        save();
        showView('capture-view');
    }

    function saveAsNew() {
        let lines = document.getElementById('batch-input').value.split('\n').map(l => l.trim()).filter(l => l);
        const newName = (document.getElementById('batch-title').value || "Untitled") + " (Copy)";
        const id = 'L' + Date.now();
        
        app.lists[id] = { 
            name: newName, 
            items: lines, 
            date: new Date().toLocaleDateString() 
        };
        app.activeId = id; // Switch to the new copy
        save();
        showView('capture-view');
    }

    function copyBatchToClipboard() {
        const title = document.getElementById('batch-title').value;
        const date = document.getElementById('batch-date').value;
        const items = document.getElementById('batch-input').value;
        const fullText = `Title: ${title}\nDate: ${date}\n\n${items}`;
        
        navigator.clipboard.writeText(fullText).then(() => {
            alert("Stack copied to clipboard! Ready to share.");
        });
    }

    function sortBatch(dir) {
        let lines = document.getElementById('batch-input').value.split('\n').map(l => l.trim()).filter(l => l);
        if (dir === 'az') lines.sort();
        if (dir === 'za') { lines.sort(); lines.reverse(); }
        if (dir === 'reverse') lines.reverse(); // Flips top to bottom
        document.getElementById('batch-input').value = lines.join('\n');
    }

    /* 4. LIBRARY MANAGEMENT */
    function renderLib() {
        const container = document.getElementById('user-lists-container');
        container.innerHTML = '';
        Object.keys(app.lists).forEach(id => {
            const item = app.lists[id];
            const b = document.createElement('div');
            b.className = 'lib-item';
            b.style.cursor = 'pointer';
            b.innerHTML = `<div><div class="lib-title">${item.name}</div><div class="lib-desc">${item.items.length} cards • ${item.date}</div></div>`;
            b.onclick = () => { app.activeId = id; save(); showView('capture-view'); };
            container.appendChild(b);
        });
    }

    function createNewList() {
        const name = prompt("Enter a name for your new Stack:");
        if (name) {
            const id = 'L' + Date.now();
            app.lists[id] = { name: name, items: [], date: new Date().toLocaleDateString() };
            app.activeId = id;
            save();
            showView('capture-view');
        }
    }

    function loadTemplate(key) {
        const id = 'L' + Date.now();
        app.lists[id] = { 
            name: templates[key].name + " (My Copy)", 
            items: templates[key].data.split('\n'),
            date: new Date().toLocaleDateString() 
        };
        app.activeId = id;
        save();
        showView('capture-view');
    }

    function deleteCurrentList() {
        if (Object.keys(app.lists).length <= 1) {
            alert("You cannot delete your only stack. Create a new one first.");
            return;
        }
        if (confirm("WARNING: Be sure you have copied and saved this list elsewhere. Deletion is permanent. Proceed?")) {
            delete app.lists[app.activeId];
            app.activeId = Object.keys(app.lists)[0]; 
            save();
            showView('capture-view');
        }
    }

    /* 5. BOT PLAYBACK ENGINE */
    function startReviewMode() {
        if (!app.lists[app.activeId].items.length) return;
        showView('playback-view');
        deck = [...app.lists[app.activeId].items].sort(() => Math.random() - 0.5);
        history = []; hIndex = -1; isPaused = false;
        next();
        tick();
    }

    function tick() {
        clearInterval(timer);
        timer = setInterval(() => {
            if (isPaused || (app.voice && window.speechSynthesis.speaking)) return;
            countdown--;
            document.getElementById('timer-text').innerText = countdown + 's';
            if (countdown <= 0) next();
        }, 1000);
    }

    function next() {
        if (hIndex < history.length - 1) {
            hIndex++;
        } else {
            if (deck.length === 0) deck = [...app.lists[app.activeId].items].sort(() => Math.random() - 0.5);
            history.push(deck.pop());
            hIndex = history.length - 1;
        }
        renderCard();
    }

    function renderCard() {
        const txt = history[hIndex];
        document.getElementById('card-term-text').innerText = txt;
        if (app.voice) {
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(txt);
            u.rate = app.speed;
            window.speechSynthesis.speak(u);
        }
        countdown = app.tempo;
        document.getElementById('timer-text').innerText = countdown + 's';
    }

    function rewindCard() { if (hIndex > 0) { hIndex--; renderCard(); } }
    function skipCard() { next(); }
    
    function togglePlayPause() { 
        isPaused = !isPaused; 
        document.getElementById('play-pause-btn').innerText = isPaused ? "▶ PLAY BOT" : "⏸ PAUSE BOT"; 
        if(isPaused) window.speechSynthesis.cancel();
    }
    
    function toggleVoice() { app.voice = !app.voice; save(); updateVoiceBtn(); if(!app.voice) window.speechSynthesis.cancel();}
    function updateVoiceBtn() { document.getElementById('voice-btn').innerText = app.voice ? "🔊 BOT VOICE: ON" : "🔇 BOT VOICE: OFF"; }
    function updateSpeed(v) { app.speed = parseFloat(v); save(); document.getElementById('speed-val').innerText = v + 'x'; }
    function updateTempo(s) { app.tempo = parseInt(s); save(); document.getElementById('tempo-val').innerText = s + 's'; }
    
    function exitReviewMode() { 
        clearInterval(timer); 
        window.speechSynthesis.cancel(); 
        showView('capture-view'); 
    }
</script>
</body>
</html>
